name: CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  backend:
    name: Backend build (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build all modules
        run: mvn -B clean install -Dmaven.test.skip=true

  frontend:
    name: Frontend build (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-rental-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: car-rental-ui/package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    name: Build & push Docker images
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - car-service
          - booking-service
          - payment-service
          - notification-service
          - car-rental-ui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/car-rental-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/car-rental-${{ matrix.service }}:${{ github.sha }}
